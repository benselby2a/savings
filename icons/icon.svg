<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f6b3a"/>
      <stop offset="100%" stop-color="#1ea85e"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="188" fill="#ffffff20"/>
  <!-- Whale body -->
  <ellipse cx="250" cy="190" rx="90" ry="55" fill="#4fc3f7"/>
  <ellipse cx="250" cy="200" rx="75" ry="40" fill="#29b6f6"/>
  <!-- Whale tail -->
  <path d="M340 185 Q370 155 365 130 Q355 150 340 160 Q345 145 335 125 Q330 150 320 165" fill="#4fc3f7"/>
  <!-- Whale eye -->
  <circle cx="195" cy="180" r="8" fill="#fff"/>

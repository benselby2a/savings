<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐳 MST</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'SF Mono', 'Fira Code', 'Consolas', 'Menlo', monospace; background: #0a0a0f; color: #c8ccd0; }
  .app { max-width: 1400px; margin: 0 auto; padding: 12px; }
  header { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px solid #1e2530; margin-bottom: 8px; }
  header h1 { font-size: 1.1rem; color: #ff8c00; font-weight: 700; letter-spacing: 1px; }
  button { cursor: pointer; border: none; border-radius: 3px; padding: 6px 14px; font-size: 0.8rem; font-family: inherit; transition: all 0.15s; }
  .btn-primary { background: #1a6baa; color: #e0e8f0; }

  .btn-danger { background: #8b2020; color: #f0c0c0; }

  .tabs { display: flex; gap: 2px; }
  .tab { padding: 8px 18px; background: #12161e; border-radius: 3px 3px 0 0; font-weight: 600; color: #556677; border: 1px solid #1e2530; border-bottom: none; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; }
  .tab.active { background: #161b24; color: #ff8c00; border-color: #2a3544; }
  .card { background: #12161e; border-radius: 4px; padding: 16px; margin-bottom: 12px; border: 1px solid #1e2530; }
  .card h2 { font-size: 0.9rem; margin-bottom: 10px; color: #ff8c00; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }

  .form-group { display: flex; flex-direction: column; gap: 4px; }

  tr:hover { background: #161b24; }
  tr.total-row { font-weight: 700; border-top: 1px solid #ff8c00; background: #0d1017; color: #ff8c00; }
  td, th, tr { transition: opacity 0.5s ease, background 0.5s ease; }
  td.dimmed, th.dimmed, tr.dimmed { opacity: 0.2; }
  td.highlighted, th.highlighted { background: #1a2233; font-weight: 700; }
  td.highlighted { background: #1a2233; }
  .account-list { display: flex; flex-direction: column; gap: 4px; }
  .account-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border: 1px solid #1e2530; border-radius: 3px; background: #0d1017; }
  .account-name { flex: 1; font-weight: 500; }
  .snapshot-table th, .snapshot-table td { text-align: left; vertical-align: middle; }
  .snapshot-table th:nth-child(2), .snapshot-table td:nth-child(2) { width: 150px; }
  .snapshot-table th:last-child, .snapshot-table td:last-child { text-align: right; }
  .snapshot-table th:last-child, .snapshot-table td:last-child { width: 220px; }
  .snapshot-table input { display: block; max-width: 180px; margin-left: auto; text-align: right; }
  .snapshot-account { display: flex; align-items: center; gap: 8px; font-weight: 500; }
  .snapshot-color { display: inline-block; width: 12px; height: 12px; border-radius: 2px; flex: 0 0 auto; }
  .snapshot-default { color: #FF9800; font-size: 0.7rem; white-space: nowrap; }
  .chart-container { width: 100%; animation: fadeIn 0.6s ease; }

  .table-scroll { overflow-x: auto; }

  .auth-container h2 { text-align: center; margin-bottom: 16px; color: #ff8c00; }
  .auth-container .form-group { margin-bottom: 12px; }
  .auth-container button { width: 100%; margin-top: 8px; }
  .auth-toggle { text-align: center; margin-top: 12px; color: #556677; font-size: 0.8rem; }
  .auth-toggle a { color: #ff8c00; cursor: pointer; text-decoration: underline; }

  .success { color: #44cc44; font-size: 0.8rem; margin-top: 4px; }
  .loading { text-align: center; padding: 40px; color: #556677; }
  .empty-state { text-align: center; padding: 40px; color: #556677; }
  .inline-edit { display: flex; gap: 4px; align-items: center; }

  .existing-dates { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .chip { padding: 3px 8px; background: #1e2530; border-radius: 3px; font-size: 0.75rem; cursor: pointer; border: none; color: #8899aa; }
  .chip:hover { background: #2a3544; }

  /* Controls bar */
  .sticky-controls { position: sticky; top: 0; z-index: 100; padding-top: 4px; padding-bottom: 2px; background: #0a0a0f; }
  .dashboard-controls { display: flex; flex-wrap: wrap; gap: 6px 14px; align-items: center; margin-bottom: 4px; padding: 6px 10px; background: #12161e; border-radius: 3px; border: 1px solid #1e2530; }
  .control-group { display: flex; align-items: center; gap: 4px; }

  .range-btn { padding: 4px 10px; background: #0d1017; border: 1px solid #2a3544; border-radius: 3px; font-size: 0.75rem; font-weight: 600; color: #667788; transition: all 0.2s ease; }

  /* Account legend / selector */
  .account-legend { display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px; align-items: center; width: 100%; }
  .legend-toggle { display: none; }
  .legend-item { display: flex; align-items: center; gap: 3px; padding: 2px 7px; border-radius: 3px; font-size: 0.7rem; font-weight: 500; cursor: pointer; border: 1px solid transparent; transition: all 0.2s ease; line-height: 1.2; }

  .legend-dot { width: 7px; height: 7px; border-radius: 50%; }

  /* Chart cards */
  .chart-card { background: #12161e; border-radius: 4px; margin-bottom: 12px; border: 1px solid #1e2530; overflow: hidden; }
  .chart-card-header { padding: 12px 16px 0; display: flex; justify-content: space-between; align-items: center; }

  /* Summary stats */
  .stats-row { display: flex; gap: 24px; padding: 0 16px 12px; }

  .stat-value { font-size: 1.4rem; font-weight: 700; color: #e0e8f0; font-variant-numeric: tabular-nums; }
  .stat-label { font-size: 0.65rem; color: #445566; text-transform: uppercase; letter-spacing: 1px; }
  .stat-change { font-size: 0.85rem; font-weight: 600; }
  .stat-change.positive { color: #44cc44; }
  .stat-change.negative { color: #ff4444; }

  /* Projections */
  .projections-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  .projections-table th, .projections-table td { padding: 8px 12px; text-align: right; border-bottom: 1px solid #1a1f28; }
  .projections-table th { background: #0d1017; font-weight: 600; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; color: #445566; }
  .projections-table th:first-child, .projections-table td:first-child { text-align: left; }
  .projections-table .scenario-label { font-weight: 500; color: #8899aa; white-space: nowrap; }
  .projections-table .conservative { color: #FF9800; }
  .projections-table .expected { color: #2196F3; font-weight: 600; }
  .projections-table .optimistic { color: #4CAF50; }
  .projections-table .growth-rate { font-size: 0.7rem; color: #556677; font-weight: 400; }
  .projection-toggle { padding: 4px 12px; background: #0d1017; border: 1px solid #2a3544; border-radius: 3px; font-size: 0.75rem; font-weight: 600; color: #667788; }
  .projection-toggle:hover { background: #1a2030; }
  .projection-toggle.active { background: #1a3320; border-color: #44cc44; color: #44cc44; }

  /* Toggle switch */
  .toggle-switch { display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; }
  .toggle-switch-label { font-size: 0.75rem; font-weight: 600; color: #667788; text-transform: uppercase; letter-spacing: 0.5px; }
  .toggle-track { position: relative; width: 36px; height: 18px; background: #2a3544; border-radius: 9px; transition: background 0.2s; flex-shrink: 0; }
  .toggle-track.active { background: #44cc44; }
  .toggle-thumb { position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; background: #c8ccd0; border-radius: 50%; transition: transform 0.2s; box-shadow: 0 1px 2px rgba(0,0,0,0.4); }
  .toggle-track.active .toggle-thumb { transform: translateX(18px); }

  /* Rate slider */
  .rate-slider-container { margin-bottom: 12px; }
  .rate-slider-labels { display: flex; justify-content: space-between; margin-bottom: 2px; }
  .rate-slider-value { font-size: 1rem; font-weight: 700; font-variant-numeric: tabular-nums; }
  .rate-slider-value.conservative { color: #FF9800; }
  .rate-slider-value.expected { color: #2196F3; }
  .rate-slider-value.optimistic { color: #4CAF50; }
  .rate-slider-label-row { display: flex; justify-content: space-between; font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; color: #556677; }
  .rate-slider { -webkit-appearance: none; appearance: none; width: 100%; height: 4px; border-radius: 2px; background: linear-gradient(to right, #FF9800, #2196F3 50%, #4CAF50); outline: none; }
  .rate-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #c8ccd0; border: 2px solid #2196F3; cursor: pointer; box-shadow: 0 0 6px rgba(33,150,243,0.4); }
  .rate-slider::-moz-range-thumb { width: 18px; height: 18px; border-radius: 50%; background: #c8ccd0; border: 2px solid #2196F3; cursor: pointer; box-shadow: 0 0 6px rgba(33,150,243,0.4); }
  .rate-slider-bounds { display: flex; justify-content: space-between; font-size: 0.65rem; color: #445566; margin-top: 4px; }
  .rate-slider-bounds span:nth-child(2) { position: relative; left: -2px; }

  /* Responsive label toggling */
  .label-short { display: none; }

  /* ── Mobile / responsive ─────────────────────────────── */
  @media (max-width: 768px) {
    .app { padding: 8px; }
    header { padding: 8px 0; margin-bottom: 8px; flex-wrap: wrap; gap: 6px; }
    header h1 { font-size: 1.2rem; }
    header > div { font-size: 0.78rem; }

    /* Tabs */
    .tabs { gap: 2px; }
    .tab { padding: 8px 12px; font-size: 0.8rem; }

    /* Sticky controls: stack groups vertically */
    .dashboard-controls { padding: 8px 10px; gap: 8px; }
    .control-group { flex-wrap: wrap; gap: 4px; }
    .control-group-label { font-size: 0.7rem; margin-right: 2px; width: 100%; }
    .range-btn { padding: 4px 8px; font-size: 0.72rem; }
    .label-full { display: none; }
    .label-short { display: inline; }
    .projection-toggle { padding: 4px 10px; font-size: 0.72rem; }
    .toggle-switch-label { font-size: 0.72rem; }
    .toggle-track { width: 34px; height: 18px; border-radius: 9px; }
    .toggle-thumb { width: 14px; height: 14px; }
    .toggle-track.active .toggle-thumb { transform: translateX(16px); }

    /* Cards */
    .card { padding: 12px; margin-bottom: 10px; }
    .card h2 { font-size: 1rem; }
    .chart-card-header { padding: 10px 12px 0; }
    .chart-card-body { padding: 8px 2px 10px; }

    /* Stats row */
    .stats-row { flex-wrap: wrap; gap: 12px; padding: 0 12px 12px; }
    .stat-value { font-size: 1.15rem; }

    /* Account legend - collapsible on mobile */
    .account-legend { grid-template-columns: repeat(3, 1fr); gap: 2px; }
    .account-legend.collapsed { display: none; }
    .legend-toggle { display: flex; align-items: center; gap: 4px; font-size: 0.7rem; font-weight: 600; color: #556677; cursor: pointer; background: none; border: none; padding: 2px 0; }
    .legend-toggle .arrow { transition: transform 0.2s; }
    .legend-toggle .arrow.open { transform: rotate(90deg); }
    .legend-item { padding: 2px 6px; font-size: 0.68rem; }

    /* Account manager form */
    .form-row { flex-direction: column; gap: 8px; }

    /* Account items */
    .account-item { flex-wrap: wrap; gap: 6px; padding: 6px; }
    .account-item select { width: auto; min-width: 0; flex: 1 1 100px; }

    /* Projections table: scroll horizontally */
    .projections-table { font-size: 0.75rem; }
    .projections-table th, .projections-table td { padding: 6px 8px; }

    /* Tables */
    th, td { padding: 6px 8px; font-size: 0.78rem; }

    /* Snapshot entry */
    .snapshot-table input { max-width: 140px; }
  }

  @media (max-width: 480px) {
    .range-btn { padding: 3px 6px; font-size: 0.68rem; }
    .control-group-label { font-size: 0.65rem; }
    .stat-value { font-size: 1rem; }
    .legend-item { padding: 1px 5px; font-size: 0.62rem; }
    .legend-dot { width: 6px; height: 6px; }
    .tab { padding: 6px 10px; font-size: 0.75rem; }
    header h1 { font-size: 1.1rem; }
    .account-item { font-size: 0.8rem; }
  }

  /* Dark scrollbars */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #0a0a0f; }
  ::-webkit-scrollbar-thumb { background: #2a3544; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #3a4a5a; }

  /* Selection */
  ::selection { background: rgba(255,140,0,0.3); color: #fff; }
</style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react/": "https://esm.sh/react@18.3.1/",
    "react-dom": "https://esm.sh/react-dom@18.3.1?deps=react@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?deps=react@18.3.1",
    "recharts": "https://esm.sh/recharts@2.15.3?bundle&external=react,react-dom&deps=react@18.3.1,react-dom@18.3.1",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.49.4?bundle",
    "htm": "https://esm.sh/htm@3.1.1?bundle"
  }

<body>
<div id="root"></div>
<script type="module">
import { createElement, useState, useEffect, useCallback, useMemo, useRef } from 'react';
import { createRoot } from 'react-dom/client';
import htm from 'htm';
import { ResponsiveContainer, LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, LabelList, Area, ComposedChart, ReferenceLine } from 'recharts';
import { createClient } from '@supabase/supabase-js';

const html = htm.bind(createElement);

// ── Supabase Config ──────────────────────────────────────────────

const SUPABASE_URL = 'https://cnkznpkvwoqxaiywwmhr.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_xlNQ_QudJNUlMLjWpr0iJA_YgO87tox';

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { db: { schema: 'savings' } });

// ── Formatting Helpers ───────────────────────────────────────────

const GBP = (v) => v == null ? '' : '£' + Number(v).toLocaleString('en-GB', { maximumFractionDigits: 0 });

function fmtDate(d) {
  const dt = new Date(d + 'T00:00:00');
  const m = dt.toLocaleString('en-GB', { month: 'short' });
  const y = String(dt.getFullYear()).slice(2);
  return m + ' ' + y;
}

const DEFAULT_COLORS = ['#00BCD4','#4CAF50','#9E9E9E','#FF9800','#F44336','#9C27B0','#2196F3','#E91E63','#795548','#607D8B'];
const CATEGORIES = ['Cash', 'Available Assets', 'Restricted Assets', 'Properties', 'Pensions'];
const PP_CATEGORIES = ['Properties', 'Pensions'];
const CATEGORY_FILTERS = [
  { id: 'ALL', label: 'All', short: 'All' },
  { id: 'ALL_EXC_PP', label: 'All Exc P&P', short: 'Exc P&P', tooltip: 'All excluding properties and pensions' },
  { id: 'Cash', label: 'Cash', short: 'Cash' },
  { id: 'Available Assets', label: 'Available Assets', short: 'Avail' },
  { id: 'Restricted Assets', label: 'Restricted Assets', short: 'Restr' },
  { id: 'Properties', label: 'Properties', short: 'Prop' },
  { id: 'Pensions', label: 'Pensions', short: 'Pens' },
];

const TIME_RANGES = [
  { id: '3M', label: '3M', months: 3 },
  { id: '1Y', label: '1Y', months: 12 },
  { id: '2Y', label: '2Y', months: 24 },
  { id: '5Y', label: '5Y', months: 60 },
  { id: 'ALL', label: 'All', months: null },
];

function getDateCutoff(rangeId) {
  const range = TIME_RANGES.find(r => r.id === rangeId);
  if (!range || !range.months) return null;
  const d = new Date();
  d.setMonth(d.getMonth() - range.months);
  return d.toISOString().slice(0, 10);
}

// ── Auth Screen ──────────────────────────────────────────────────

function AuthScreen({ supabase }) {
  const [isSignUp, setIsSignUp] = useState(false);
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [message, setMessage] = useState('');
  const [loading, setLoading] = useState(false);

  const handleSubmit = async (e) => {
    e.preventDefault();
    setError(''); setMessage(''); setLoading(true);
    try {
      if (isSignUp) {
        const { error } = await supabase.auth.signUp({ email, password });
        if (error) throw error;
        setMessage('Check your email to confirm your account.');
      } else {
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;
      }
    } catch (err) {
      setError(err.message);
    }
    setLoading(false);
  };

  return html`<div class="auth-container"><div class="card">
    <h2>${isSignUp ? 'Create Account' : 'Sign In'}</h2>
    <form onSubmit=${handleSubmit}>
      <div class="form-group"><label>Email</label>
        <input type="email" value=${email} onInput=${e => setEmail(e.target.value)} required />
      </div>
      <div class="form-group"><label>Password</label>
        <input type="password" value=${password} onInput=${e => setPassword(e.target.value)} required minLength="6" />
      </div>
      ${error && html`<div class="error">${error}</div>`}
      ${message && html`<div class="success">${message}</div>`}
      <button class="btn-primary" type="submit" disabled=${loading}>${loading ? 'Loading...' : isSignUp ? 'Sign Up' : 'Sign In'}</button>
    </form>
    <div class="auth-toggle">
      ${isSignUp ? 'Already have an account? ' : "Don't have an account? "}
      <a onClick=${() => { setIsSignUp(!isSignUp); setError(''); setMessage(''); }}>${isSignUp ? 'Sign In' : 'Sign Up'}</a>
    </div>
  </div></div>`;
}

// ── Hooks ────────────────────────────────────────────────────────

function useAccounts(supabase, userId) {
  const [accounts, setAccounts] = useState([]);
  const [loading, setLoading] = useState(true);

  const fetch = useCallback(async () => {
    const { data } = await supabase.from('accounts').select('*').order('display_order');
    setAccounts(data || []);
    setLoading(false);
  }, [supabase]);

  useEffect(() => { fetch(); }, [fetch]);

  const add = async (name, color, owner, category) => {
    const order = accounts.length;
    await supabase.from('accounts').insert({ user_id: userId, name, color, owner, category, display_order: order });
    await fetch();
  };

  const update = async (id, fields) => {
    await supabase.from('accounts').update(fields).eq('id', id);
    await fetch();
  };

  const remove = async (id) => {
    await supabase.from('accounts').delete().eq('id', id);
    await fetch();
  };

  return { accounts, loading, add, update, remove, refresh: fetch };
}

function useSnapshots(supabase, userId) {
  const [snapshots, setSnapshots] = useState([]);
  const [loading, setLoading] = useState(true);

  const fetch = useCallback(async () => {
    const { data } = await supabase.from('snapshots').select('*').order('date');
    setSnapshots(data || []);
    setLoading(false);
  }, [supabase]);

  useEffect(() => { fetch(); }, [fetch]);

  const upsert = async (accountId, date, amount) => {
    const existing = snapshots.find(s => s.account_id === accountId && s.date === date);
    if (existing) {
      await supabase.from('snapshots').update({ amount }).eq('id', existing.id);
    } else {
      await supabase.from('snapshots').insert({ user_id: userId, account_id: accountId, date, amount });
    }
  };

  const saveBatch = async (date, entries) => {
    for (const { accountId, amount } of entries) {
      if (amount !== '' && amount != null) {
        await upsert(accountId, date, Number(amount));
      }
    }
    await fetch();
  };

  const remove = async (id) => {
    await supabase.from('snapshots').delete().eq('id', id);
    await fetch();
  };

  return { snapshots, loading, saveBatch, remove, refresh: fetch };
}

function useOwners(supabase) {
  const [owners, setOwners] = useState([]);
  const [loading, setLoading] = useState(true);

  const fetch = useCallback(async () => {
    const { data } = await supabase.from('owners').select('*').order('created_at');
    setOwners(data || []);
    setLoading(false);
  }, [supabase]);

  useEffect(() => { fetch(); }, [fetch]);

  const add = async (name) => {
    await supabase.from('owners').insert({ name });
    await fetch();
  };

  const remove = async (id) => {
    await supabase.from('owners').delete().eq('id', id);
    await fetch();
  };

  return { owners, loading, add, remove, refresh: fetch };
}

// ── Snapshot Entry ───────────────────────────────────────────────

function SnapshotEntry({ accounts, snapshots, onSave }) {
  const [date, setDate] = useState(new Date().toISOString().slice(0, 10));
  const [values, setValues] = useState({});
  const [defaulted, setDefaulted] = useState({});
  const [saving, setSaving] = useState(false);
  const [message, setMessage] = useState('');

  const dates = useMemo(() => [...new Set(snapshots.map(s => s.date))].sort(), [snapshots]);

  const lastSnapshotValues = useMemo(() => {
    const result = {};
    const sortedDates = [...dates].sort();
    for (const a of accounts) {
      for (let i = sortedDates.length - 1; i >= 0; i--) {
        const snap = snapshots.find(s => s.date === sortedDates[i] && s.account_id === a.id);
        if (snap && Number(snap.amount) > 0) {
          result[a.id] = { value: String(snap.amount), fromDate: sortedDates[i] };
          break;
        }
      }
    }
    return result;
  }, [accounts, snapshots, dates]);

  useEffect(() => {
    const existing = {};
    const isDefaulted = {};
    let hasExisting = false;
    for (const s of snapshots) {
      if (s.date === date) { existing[s.account_id] = String(s.amount); hasExisting = true; }
    }
    if (hasExisting) {
      setValues(existing);
      setDefaulted({});
    } else {
      const vals = {};
      const defs = {};
      for (const a of accounts) {
        const last = lastSnapshotValues[a.id];
        if (last) { vals[a.id] = last.value; defs[a.id] = last.fromDate; }
      }
      setValues(vals);
      setDefaulted(defs);
    }
  }, [date, snapshots, accounts, lastSnapshotValues]);

  const handleInput = (accountId, val) => {
    setValues({ ...values, [accountId]: val });
    const newDefaulted = { ...defaulted };
    delete newDefaulted[accountId];
    setDefaulted(newDefaulted);
  };

  const handleSave = async () => {
    setSaving(true); setMessage('');
    const entries = accounts.map(a => ({ accountId: a.id, amount: values[a.id] || '' })).filter(e => e.amount !== '');
    if (entries.length === 0) { setMessage('Enter at least one value.'); setSaving(false); return; }
    await onSave(date, entries);
    setMessage('Saved!');
    setDefaulted({});
    setSaving(false);
    setTimeout(() => setMessage(''), 2000);
  };

  const hasDefaults = Object.keys(defaulted).length > 0;

  return html`<div class="card">
    <h2>Enter Snapshot</h2>
    <div style=${{ display: 'flex', gap: 12, marginBottom: 12, flexWrap: 'wrap' }}>
      <div class="form-group" style=${{ maxWidth: 200 }}>
        <label>Date</label>
        <input type="date" value=${date} onInput=${e => setDate(e.target.value)} />
      </div>
      ${dates.length > 0 && html`<div class="form-group" style=${{ maxWidth: 220 }}>
        <label>Edit existing date</label>
        <select value=${dates.includes(date) ? date : ''} onChange=${e => { if (e.target.value) setDate(e.target.value); }}>
          <option value="">— Select —</option>
          ${[...dates].reverse().map(d => html`<option key=${d} value=${d}>${fmtDate(d)}</option>`)}
        </select>
      </div>`}
    </div>
    ${hasDefaults && html`<div style=${{ fontSize: '0.8rem', color: '#FF9800', marginBottom: 8, display: 'flex', alignItems: 'center', gap: 6 }}>
      <span style=${{ display: 'inline-block', width: 8, height: 8, borderRadius: '50%', background: '#FF9800' }}></span>
      Values pre-filled from last snapshot. Edit any field to override.
    </div>`}
    <div class="table-scroll">
      <table class="snapshot-table">
        <thead>
          <tr>
            <th>Account</th>
            ${hasDefaults && html`<th>Pre-filled From</th>`}
            <th>Amount</th>
          </tr>
        </thead>
        <tbody>
          ${accounts.map(a => html`<tr key=${a.id}>
            <td>
              <span class="snapshot-account">
                <span class="snapshot-color" style=${{ background: a.color }}></span>
                ${a.name}
              </span>
            </td>
            ${hasDefaults && html`<td class="snapshot-default">${defaulted[a.id] ? fmtDate(defaulted[a.id]) : ''}</td>`}
            <td>
              <input type="text" inputmode="decimal" pattern="[0-9]*\.?[0-9]*" placeholder="0" value=${values[a.id] || ''}
                onInput=${e => handleInput(a.id, e.target.value)}
                style=${defaulted[a.id] ? { borderColor: '#FF9800', background: '#FFF8E1' } : {}} />
            </td>
          </tr>`)}
        </tbody>
      </table>
    </div>
    ${accounts.length === 0 && html`<div class="empty-state">Add accounts first in the Accounts tab.</div>`}
    <div style=${{ marginTop: 12, display: 'flex', gap: 8, alignItems: 'center' }}>
      <button class="btn-primary" onClick=${handleSave} disabled=${saving || accounts.length === 0}>${saving ? 'Saving...' : 'Save Snapshot'}</button>
      ${message && html`<span class="success">${message}</span>`}
    </div>
  </div>`;
}

function buildChartData(accounts, snapshots, cutoffDate) {
  const dates = [...new Set(snapshots.map(s => s.date))].sort();
  const filtered = cutoffDate ? dates.filter(d => d >= cutoffDate) : dates;
  return filtered.map(date => {
    const row = { date, dateLabel: fmtDate(date) };
    let total = 0;
    for (const a of accounts) {
      const snap = snapshots.find(s => s.date === date && s.account_id === a.id);
      const val = snap ? Number(snap.amount) : 0;
      row[a.id] = val;
      total += val;
    }
    row.total = total;
    return row;
  });
}

// ── Projection Chart Data ────────────────────────────────────────

function buildProjectionData(chartData, accounts, snapshots, selectedIds, rate) {
  const proj = calcProjections(accounts, snapshots, selectedIds, rate);
  if (!proj || chartData.length === 0) return null;

  const last = chartData[chartData.length - 1];
  const lastDate = new Date(last.date);
  const currentValue = proj.currentValue;
  const recent = proj.recentGrowth;

  const conservativeRate = proj.scenarios[0].rate;
  const averageRate = proj.scenarios[1].rate;
  const optimisticRate = proj.scenarios[2].rate;

  const points = [{ date: last.date, dateLabel: last.dateLabel, proj_expected: currentValue, proj_low: currentValue, proj_high: currentValue }];

  const steps = [0.25, 0.5, 1, 1.5, 2, 3, 5, 7, 10];
  for (const years of steps) {
    const d = new Date(lastDate);
    d.setDate(d.getDate() + Math.round(years * 365.25));
    const dateStr = d.toISOString().slice(0, 10);
    points.push({
      date: dateStr,
      dateLabel: fmtDate(dateStr),
      proj_expected: blendedProject(currentValue, recent, averageRate, years),
      proj_low: blendedProject(currentValue, recent, conservativeRate, years),
      proj_high: blendedProject(currentValue, recent, optimisticRate, years),
    });
  }
  return points;
}

function SavingsLineChart({ accounts, data, selectedIds, projectionData, chartKey, tooltipKey }) {
  if (data.length === 0) return html`<div class="empty-state">No data yet.</div>`;
  const hasSelection = selectedIds.length > 0;
  const lastTooltipKey = useRef(tooltipKey);
  const [tooltipVisible, setTooltipVisible] = useState(true);

  useEffect(() => {
    if (tooltipKey !== lastTooltipKey.current) {
      setTooltipVisible(false);
      lastTooltipKey.current = tooltipKey;
    }
  }, [tooltipKey]);

  const CustomTooltip = ({ active, payload, label }) => {
    if (!tooltipVisible && active) { setTooltipVisible(true); return null; }
    if (!tooltipVisible || !active || !payload) return null;
    const sorted = [...payload].filter(p => p.value != null && p.dataKey !== 'proj_range' && p.dataKey !== 'proj_high' && p.dataKey !== 'proj_low').sort((a, b) => (b.value || 0) - (a.value || 0));
    return html`<div style=${{ background: '#1a1a2e', border: 'none', borderRadius: 8, padding: '12px 16px', fontSize: '0.82rem', color: '#fff', boxShadow: '0 4px 12px rgba(0,0,0,0.3)' }}>
      <div style=${{ fontWeight: 600, marginBottom: 6, color: '#aaa', fontSize: '0.75rem', textTransform: 'uppercase' }}>${typeof label === 'number' ? fmtDate(new Date(label).toISOString().slice(0, 10)) : label}</div>
      ${sorted.map(p => html`<div key=${p.dataKey} style=${{ display: 'flex', justifyContent: 'space-between', gap: 20, padding: '2px 0' }}>
        <span style=${{ display: 'flex', alignItems: 'center', gap: 6 }}>

          ${p.name}
        </span>
        <span style=${{ fontWeight: 600, fontVariantNumeric: 'tabular-nums' }}>${GBP(p.value)}</span>
      </div>`)}
    </div>`;
  };

  const mergedData = useMemo(() => {
    const addTs = d => ({ ...d, _ts: new Date(d.date).getTime() });
    if (!projectionData) return data.map(addTs);
    const combined = data.map(d => ({ ...d }));
    for (const p of projectionData) {
      const existing = combined.find(d => d.date === p.date);
      if (existing) {
        existing.proj_expected = p.proj_expected;
        existing.proj_range = [p.proj_low, p.proj_high];
        existing.proj_high = p.proj_high;
        existing.proj_low = p.proj_low;
      } else {
        combined.push({ dateLabel: p.dateLabel, date: p.date, proj_expected: p.proj_expected, proj_range: [p.proj_low, p.proj_high], proj_high: p.proj_high, proj_low: p.proj_low });
      }
    }
    combined.sort((a, b) => a.date.localeCompare(b.date));
    return combined.map(addTs);
  }, [data, projectionData]);

  const yDomain = useMemo(() => {
    if (!hasSelection) return [0, 'auto'];
    let max = 0;
    const keys = selectedIds;
    for (const d of mergedData) {
      for (const k of keys) {
        const v = Number(d[k]) || 0;
        if (v > max) max = v;
      }
      if (d.proj_expected != null) {
        const v = Number(d.proj_expected) || 0;
        if (v > max) max = v;
      }
      if (d.proj_high != null) {
        const v = Number(d.proj_high) || 0;
        if (v > max) max = v;
      }
    }
    return [0, Math.ceil(max * 1.1)];
  }, [mergedData, selectedIds, hasSelection]);

  const xAxisConfig = { dataKey: '_ts', type: 'number', scale: 'time', domain: ['dataMin', 'dataMax'],
    tickFormatter: ts => fmtDate(new Date(ts).toISOString().slice(0, 10)),
    tick: { fontSize: 11, fill: '#556677', fontFamily: 'inherit' }, axisLine: { stroke: '#1e2530' }, tickLine: false };

  return html`<div class="chart-container">
    <${ResponsiveContainer} width="100%" height=${400}>
      <${ComposedChart} key=${chartKey} data=${mergedData} margin=${{ top: 5, right: 30, left: 20, bottom: 5 }}>
        <${CartesianGrid} strokeDasharray="3 3" stroke="#1e2530" />
        <${XAxis} ...${xAxisConfig} />
        <${YAxis} tickFormatter=${GBP} tick=${{ fontSize: 11, fill: '#556677', fontFamily: 'inherit' }} axisLine=${false} tickLine=${false} width=${80}
          domain=${yDomain} allowDataOverflow=${hasSelection} />
        <${Tooltip} content=${html`<${CustomTooltip} />`} trigger="click" />
        ${projectionData && html`<${Area} type="monotone" dataKey="proj_range" stroke="none" fill="#2196F3" fillOpacity=${0.12} name="Projection range" dot=${false} activeDot=${false} connectNulls=${true} animationDuration=${1000} animationEasing="ease-in-out" />`}
        ${accounts.map(a => {
          const isSelected = selectedIds.includes(a.id);
          const isHighlighted = !hasSelection || isSelected;
          return html`<${Line} key=${a.id} type="monotone" dataKey=${a.id} name=${a.name}
            stroke=${a.color} strokeWidth=${isSelected ? 3 : 2}
            strokeOpacity=${isHighlighted ? 1 : 0.15}
            dot=${isHighlighted ? { r: isSelected ? 5 : 3, fill: a.color, strokeWidth: 0 } : false}
            activeDot=${isHighlighted ? { r: 7, strokeWidth: 2, stroke: '#fff', cursor: 'pointer' } : false} connectNulls=${false}
            animationDuration=${1000} animationEasing="ease-in-out" />`;

          dot=${!hasSelection ? { r: 4, fill: '#e0e8f0', strokeWidth: 0 } : false} connectNulls=${false}

      <//>

// ── Stacked Bar Chart ────────────────────────────────────────────

function SavingsBarChart({ accounts, data, selectedIds, chartKey, tooltipKey }) {
  if (data.length === 0) return html`<div class="empty-state">No data yet.</div>`;
  const hasSelection = selectedIds.length > 0;
  const lastTooltipKey2 = useRef(tooltipKey);
  const [tooltipVisible2, setTooltipVisible2] = useState(true);

  useEffect(() => {
    if (tooltipKey !== lastTooltipKey2.current) {
      setTooltipVisible2(false);
      lastTooltipKey2.current = tooltipKey;
    }
  }, [tooltipKey]);

  const compactGBP = (v) => {
    if (v == null) return '';
    const n = Number(v);
    if (n >= 1000000) return '£' + (n / 1000000).toFixed(1) + 'M';
    if (n >= 1000) return '£' + (n / 1000).toFixed(n >= 10000 ? 0 : 1) + 'k';
    return '£' + n.toFixed(0);
  };

  const renderLabel = (props) => {
    const { x, y, width, height, value } = props;
    if (!value || height < 14 || width < 24) return null;
    const fs = width < 35 ? 7 : width < 50 ? 8 : 10;
    return html`<text x=${x + width / 2} y=${y + height / 2} fill="white" textAnchor="middle" dominantBaseline="middle"
      fontSize=${fs} fontWeight="500" style=${{ letterSpacing: '-0.3px' }}>${compactGBP(value)}</text>`;
  };

  return html`<div class="chart-container">
    <${ResponsiveContainer} width="100%" height=${500}>
      <${BarChart} key=${chartKey} data=${data} margin=${{ top: 5, right: 30, left: 20, bottom: 5 }}
        onClick=${() => setTooltipVisible2(true)}>
        <${CartesianGrid} strokeDasharray="3 3" stroke="#1e2530" />
        <${XAxis} dataKey="dateLabel" tick=${{ fontSize: 11, fill: '#556677', fontFamily: 'inherit' }} axisLine=${{ stroke: '#1e2530' }} tickLine=${false} />
        <${YAxis} tickFormatter=${GBP} tick=${{ fontSize: 11, fill: '#556677', fontFamily: 'inherit' }} axisLine=${false} tickLine=${false} width=${80} />
        <${Tooltip} formatter=${(v, name) => [GBP(v), name]} trigger="click"
          contentStyle=${{ background: '#1a1a2e', border: 'none', borderRadius: 8, color: '#fff' }}
          labelStyle=${{ color: '#aaa', fontSize: '0.75rem', textTransform: 'uppercase' }}
          wrapperStyle=${tooltipVisible2 ? {} : { display: 'none' }} />
        ${accounts.map(a => {
          const isHighlighted = !hasSelection || selectedIds.includes(a.id);
          return html`<${Bar} key=${a.id} dataKey=${a.id} name=${a.name} stackId="stack"
            fill=${a.color} fillOpacity=${isHighlighted ? 1 : 0.15}
            animationDuration=${1000} animationEasing="ease-in-out">
            ${isHighlighted && html`<${LabelList} dataKey=${a.id} content=${renderLabel} />`}
          <//>`;
        })}
      <//>
    <//>
  </div>`;
}

// ── Projections ──────────────────────────────────────────────────

const PROJECTION_HORIZONS = [
  { label: '+3 months', years: 0.25 },
  { label: '+1 year', years: 1 },
  { label: '+2 years', years: 2 },
  { label: '+5 years', years: 5 },
  { label: '+10 years', years: 10 },
];

const DEFAULT_PROJECTION_RATE = 4;
const PROJECTION_SPREAD = 2;

const BLEND_YEARS = 2; // years over which recent growth blends into selected rate

function calcRecentGrowth(snapshots, accountIds) {
  const dates = [...new Set(snapshots.map(s => s.date))].sort();
  if (dates.length < 2) return null;
  const latestDate = dates[dates.length - 1];
  const oneYearAgo = new Date(new Date(latestDate).getTime() - 365.25 * 24 * 60 * 60 * 1000).toISOString().slice(0, 10);
  // Find the closest date to one year ago
  let bestDate = dates[0];
  for (const d of dates) {
    if (d <= oneYearAgo) bestDate = d;
  }
  if (bestDate === latestDate) bestDate = dates[Math.max(0, dates.length - 2)];

  const getTotal = (date) => {
    let sum = 0;
    for (const id of accountIds) {
      const snap = snapshots.find(s => s.date === date && s.account_id === id);
      if (snap) sum += Number(snap.amount);
    }
    return sum;
  };

  const oldVal = getTotal(bestDate);
  const newVal = getTotal(latestDate);
  if (oldVal <= 0) return null;
  const elapsedYears = (new Date(latestDate) - new Date(bestDate)) / (365.25 * 24 * 60 * 60 * 1000);
  if (elapsedYears < 0.05) return null;
  return Math.pow(newVal / oldVal, 1 / elapsedYears) - 1;
}

function blendedProject(currentValue, recentRate, targetRate, years) {
  // Compound in small steps, blending from recentRate to targetRate over BLEND_YEARS
  const stepSize = 0.05; // ~18 day steps for precision
  let value = currentValue;
  for (let t = 0; t < years; t += stepSize) {
    const dt = Math.min(stepSize, years - t);
    const blend = Math.min(t / BLEND_YEARS, 1);
    const rate = recentRate * (1 - blend) + targetRate * blend;
    value *= Math.pow(1 + rate, dt);
  }
  return value;
}

function calcProjections(accounts, snapshots, selectedIds, rate) {
  const accountIds = selectedIds.length > 0 ? selectedIds : accounts.map(a => a.id);
  const dates = [...new Set(snapshots.map(s => s.date))].sort();
  if (dates.length < 1) return null;

  const getTotal = (date) => {
    let sum = 0;
    for (const id of accountIds) {
      const snap = snapshots.find(s => s.date === date && s.account_id === id);
      if (snap) sum += Number(snap.amount);
    }
    return sum;
  };

  const latestDate = dates[dates.length - 1];
  const currentValue = getTotal(latestDate);
  if (currentValue <= 0) return null;

  const recentGrowth = calcRecentGrowth(snapshots, accountIds);
  const averageRate = (rate || 0) / 100;
  const conservativeRate = averageRate - PROJECTION_SPREAD / 100;
  const optimisticRate = averageRate + PROJECTION_SPREAD / 100;

  const recent = recentGrowth != null ? recentGrowth : averageRate;

  const project = (targetRate, years) => blendedProject(currentValue, recent, targetRate, years);

  return {
    currentValue,
    latestDate: fmtDate(latestDate),
    recentGrowth: recent,
    scenarios: [
      { name: 'Conservative', rate: conservativeRate, cls: 'conservative',
        values: PROJECTION_HORIZONS.map(h => project(conservativeRate, h.years)) },
      { name: 'Average', rate: averageRate, cls: 'expected',
        values: PROJECTION_HORIZONS.map(h => project(averageRate, h.years)) },
      { name: 'Optimistic', rate: optimisticRate, cls: 'optimistic',
        values: PROJECTION_HORIZONS.map(h => project(optimisticRate, h.years)) },
    ]
  };
}

function ProjectionsCard({ accounts, snapshots, selectedIds, rate, onRateChange }) {
  const projections = useMemo(() => calcProjections(accounts, snapshots, selectedIds, rate), [accounts, snapshots, selectedIds, rate]);

  if (!projections) return html`<div class="card"><h2>Projections</h2><div class="empty-state">Not enough data to project.</div></div>`;

  const selectedAccts = accounts.filter(a => selectedIds.includes(a.id));
  const label = selectedAccts.length > 0 ? selectedAccts.map(a => a.name).join(', ') : 'Total';

  const lowRate = rate - PROJECTION_SPREAD;
  const highRate = rate + PROJECTION_SPREAD;

  return html`<div class="card" style=${{ padding: '12px 16px' }}>
    <div style=${{ display: 'flex', alignItems: 'center', gap: 16, flexWrap: 'wrap' }}>
      <div style=${{ display: 'flex', alignItems: 'center', gap: 8, fontSize: '0.8rem', color: '#556677', whiteSpace: 'nowrap' }}>
        <strong style=${{ color: '#ff8c00', fontSize: '0.85rem', textTransform: 'uppercase', letterSpacing: '1px' }}>Projection</strong>
        <span>Recent: <strong style=${{ color: '#e0e8f0' }}>${(projections.recentGrowth * 100).toFixed(1)}%</strong></span>
      </div>
      <div style=${{ flex: 1, minWidth: 200, display: 'flex', alignItems: 'center', gap: 10 }}>
        <span style=${{ fontSize: '0.75rem', fontWeight: 700, color: '#FF9800', whiteSpace: 'nowrap' }}>${lowRate.toFixed(1)}%</span>
        <input type="range" class="rate-slider" min="-20" max="20" step="0.5" value=${rate}
          onInput=${e => onRateChange(parseFloat(e.target.value))} style=${{ flex: 1 }} />
        <span style=${{ fontSize: '0.75rem', fontWeight: 700, color: '#4CAF50', whiteSpace: 'nowrap' }}>${highRate.toFixed(1)}%</span>
      </div>
      <span style=${{ fontSize: '0.9rem', fontWeight: 700, color: '#2196F3', whiteSpace: 'nowrap' }}>${rate.toFixed(1)}% p.a.</span>
    </div>
  </div>`;
}

// ── Dashboard ────────────────────────────────────────────────────

function Dashboard({ supabase, userId, userEmail, onLogout }) {
  const { accounts, loading: accLoading, add: addAccount, update: updateAccount, remove: removeAccount } = useAccounts(supabase, userId);
  const { snapshots, loading: snapLoading, saveBatch } = useSnapshots(supabase, userId);
  const { owners: ownerRecords, loading: ownersLoading, add: addOwner, remove: removeOwner } = useOwners(supabase);
  const [tab, setTab] = useState('dashboard');
  const [ownerFilter, setOwnerFilter] = useState('All');
  const [categoryFilter, setCategoryFilter] = useState('ALL_EXC_PP');
  const [timeRange, setTimeRange] = useState('ALL');
  const [selectedAccounts, setSelectedAccounts] = useState([]);
  const [showProjections, setShowProjections] = useState(false);
  const [projectionRate, setProjectionRate] = useState(DEFAULT_PROJECTION_RATE);
  const [tooltipBump, setTooltipBump] = useState(0);
  const chartAreaRef = useRef(null);
  const prevFiltersRef = useRef('');
  const [chartKey, setChartKey] = useState(0);

  const filterSig = `${ownerFilter}-${categoryFilter}-${timeRange}-${selectedAccounts.join(',')}-${showProjections}`;
  useEffect(() => {
    if (prevFiltersRef.current && prevFiltersRef.current !== filterSig) {
      setChartKey(k => k + 1);
    }
    prevFiltersRef.current = filterSig;
  }, [filterSig]);

  useEffect(() => {
    const handler = (e) => {
      if (chartAreaRef.current && !chartAreaRef.current.contains(e.target)) {
        setTooltipBump(k => k + 1);
      }
    };
    document.addEventListener('click', handler);
    return () => document.removeEventListener('click', handler);
  }, []);

  const ownerNames = useMemo(() => ownerRecords.map(o => o.name), [ownerRecords]);

  const visibleAccounts = useMemo(() => accounts.filter(a => !a.hidden), [accounts]);

  const filteredAccounts = useMemo(() =>
    visibleAccounts.filter(a => {
      if (ownerFilter !== 'All' && (a.owner || 'Joint') !== ownerFilter) return false;
      const cat = a.category || 'Cash';
      if (categoryFilter === 'ALL') return true;
      if (categoryFilter === 'ALL_EXC_PP') return !PP_CATEGORIES.includes(cat);
      if (categoryFilter !== cat) return false;
      return true;
    }),
    [visibleAccounts, ownerFilter, categoryFilter]
  );

  useEffect(() => {
    const filteredAccountIds = new Set(filteredAccounts.map(a => a.id));
    setSelectedAccounts(selected => selected.filter(id => filteredAccountIds.has(id)));
  }, [filteredAccounts]);


  const selectedAccountSet = useMemo(() => new Set(selectedAccounts), [selectedAccounts]);
  const selectedAccountLabel = useMemo(() => {
    const selected = filteredAccounts.filter(a => selectedAccountSet.has(a.id));
    if (selected.length === 0) return 'Total';
    if (selected.length === 1) return selected[0].name;
    return `${selected.length} accounts`;
  }, [filteredAccounts, selectedAccountSet]);

  const cutoffDate = useMemo(() => getDateCutoff(timeRange), [timeRange]);
  const chartData = useMemo(() => buildChartData(filteredAccounts, snapshots, cutoffDate), [filteredAccounts, snapshots, cutoffDate]);

  const stats = useMemo(() => {
    if (chartData.length < 1) return null;
    const latest = chartData[chartData.length - 1];
    const first = chartData[0];
    const currentTotal = selectedAccounts.length > 0 ? selectedAccounts.reduce((sum, id) => sum + (latest[id] || 0), 0) : latest.total;
    const startTotal = selectedAccounts.length > 0 ? selectedAccounts.reduce((sum, id) => sum + (first[id] || 0), 0) : first.total;
    const change = currentTotal - startTotal;
    const changePct = startTotal > 0 ? ((change / startTotal) * 100).toFixed(1) : 0;
    return { currentTotal, change, changePct, latestDate: latest.dateLabel };
  }, [chartData, selectedAccounts]);

  if (accLoading || snapLoading || ownersLoading) return html`<div class="loading">Loading...</div>`;

  const tabs = [
    { id: 'dashboard', label: 'Dashboard' },
    { id: 'entry', label: 'Data Entry' },
    { id: 'accounts', label: 'Accounts' },
  ];

  const filterOptions = ['All', ...ownerNames];

  return html`<div class="app">
    <header>
      <h1>🐳 MST</h1>
      <div style=${{ display: 'flex', alignItems: 'center', gap: 12 }}>
        <span style=${{ fontSize: '0.8rem', color: '#556677' }}>${userEmail}</span>
        <button class="btn-secondary btn-sm" onClick=${onLogout}>Sign Out</button>
      </div>
    </header>
    <div style=${{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
      <div class="tabs">
        ${tabs.map(t => html`<button key=${t.id} class=${'tab' + (tab === t.id ? ' active' : '')} onClick=${() => setTab(t.id)}>${t.label}</button>`)}
      </div>
    </div>

    ${tab === 'dashboard' && html`<div>
      <div class="sticky-controls">
        <div class="dashboard-controls">
          <div class="control-group">
            <span class="control-group-label">Period</span>
            ${TIME_RANGES.map(r => html`<button key=${r.id}
              class=${'range-btn' + (timeRange === r.id ? ' active' : '')}
              onClick=${() => setTimeRange(r.id)}>${r.label}</button>`)}
          </div>
          <div class="control-group">
            <span class="control-group-label">Owner</span>
            ${filterOptions.map(o => html`<button key=${o}
              class=${'range-btn' + (ownerFilter === o ? ' active' : '')}
              onClick=${() => setOwnerFilter(o)}>${o}</button>`)}
          </div>
          <div class="control-group">
            <div class="toggle-switch" onClick=${() => setShowProjections(!showProjections)}>
              <span class="toggle-switch-label">Projections</span>
              <div class=${'toggle-track' + (showProjections ? ' active' : '')}>
                <div class="toggle-thumb"></div>
              </div>
            </div>
          </div>
          <div class="control-group">
            <span class="control-group-label">Category</span>
            ${CATEGORY_FILTERS.map(c => html`<button key=${c.id}
              class=${'range-btn' + (categoryFilter === c.id ? ' active' : '')}
              onClick=${() => setCategoryFilter(c.id)}
              title=${c.tooltip || ''}><span class="label-full">${c.label}</span><span class="label-short">${c.short}</span></button>`)}
          </div>
          <div class="control-group" style=${{ flex: '1 1 100%', borderTop: '1px solid #1e2530', paddingTop: 4, marginTop: 0 }}>
            <${AccountLegend} accounts=${filteredAccounts} selectedIds=${selectedAccounts} onSelect=${setSelectedAccounts} />
          </div>
        </div>
      </div>

      ${stats && html`<div class="chart-card">
        <div class="stats-row" style=${{ paddingTop: 16 }}>
          <div class="stat">
            <span class="stat-value">${GBP(stats.currentTotal)}</span>
            <span class="stat-label">${selectedAccountLabel} — ${stats.latestDate}</span>
          </div>
          <div class="stat">
            <span class=${'stat-change ' + (stats.change >= 0 ? 'positive' : 'negative')}>
              ${stats.change >= 0 ? '+' : ''}${GBP(stats.change)} (${stats.change >= 0 ? '+' : ''}${stats.changePct}%)
            </span>
            <span class="stat-label">Change over period</span>
          </div>
        </div>
      </div>`}

      ${showProjections && html`<${ProjectionsCard} accounts=${filteredAccounts} snapshots=${snapshots} selectedIds=${selectedAccounts} rate=${projectionRate} onRateChange=${setProjectionRate} />`}

      <div ref=${chartAreaRef}>
        <div class="chart-card">
          <div class="chart-card-header"><h2>Savings Over Time</h2></div>
          <div class="chart-card-body">
            <${SavingsLineChart} accounts=${filteredAccounts} data=${chartData} selectedIds=${selectedAccounts}
              projectionData=${showProjections ? buildProjectionData(chartData, filteredAccounts, snapshots, selectedAccounts, projectionRate) : null}
              chartKey=${chartKey} tooltipKey=${tooltipBump} />
          </div>
        </div>

        <div class="chart-card">
          <div class="chart-card-header"><h2>Savings Breakdown</h2></div>
          <div class="chart-card-body">
            <${SavingsBarChart} accounts=${filteredAccounts} data=${chartData} selectedIds=${selectedAccounts}
              chartKey=${chartKey} tooltipKey=${tooltipBump} />
          </div>
        </div>
      </div>

      <div class="card">
        <h2>Savings Data</h2>
        <${DataTable} accounts=${filteredAccounts} data=${chartData} selectedIds=${selectedAccounts} />
      </div>
    </div>`}

    ${tab === 'entry' && html`<${SnapshotEntry} accounts=${visibleAccounts} snapshots=${snapshots} onSave=${saveBatch} />`}
    ${tab === 'accounts' && html`<div>
      <${AccountManager} accounts=${accounts} owners=${ownerNames} onAdd=${addAccount} onUpdate=${updateAccount} onRemove=${removeAccount} />
      <${OwnerManager} owners=${ownerRecords} accounts=${accounts} onAdd=${addOwner} onRemove=${removeOwner} />
    </div>`}
  </div>`;
}

// ── App Root ─────────────────────────────────────────────────────

function App() {
  const [session, setSession] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    supabase.auth.getSession().then(({ data: { session } }) => {
      setSession(session);
      setLoading(false);
    });
    const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => setSession(session));
    return () => subscription.unsubscribe();
  }, []);

  if (loading) return html`<div class="loading">Loading...</div>`;
  if (!session) return html`<${AuthScreen} supabase=${supabase} />`;

  return html`<${Dashboard}
    supabase=${supabase}
    userId=${session.user.id}
    userEmail=${session.user.email}
    onLogout=${() => supabase.auth.signOut()}
  />`;
}

// ── Mount ────────────────────────────────────────────────────────

createRoot(document.getElementById('root')).render(html`<${App} />`);
</script>
</body>
</html>
